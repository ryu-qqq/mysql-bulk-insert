name: JMH Benchmark

# 트리거: 수동 실행만 (의존성/JVM 업데이트 후 성능 회귀 확인 시)
# 자동 cron 미설정 — 코드 변화 없으면 결과도 같음, CI 비용만 발생.
on:
  workflow_dispatch:

permissions:
  contents: write  # 차트 SVG commit 위해

jobs:
  benchmark:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0.36
        env:
          MYSQL_ROOT_PASSWORD: rootpwd
          MYSQL_DATABASE: ryuqq
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpwd"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r .github/scripts/requirements.txt

      - name: Wait for MySQL ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -prootpwd --silent; then
              echo "MySQL is ready"
              break
            fi
            sleep 2
          done

      - name: Run JMH benchmark
        env:
          # application.yml test profile 의 storage.datasource.core.* 를 override
          # (CI 의 service container 가 localhost:3306 에 노출됨)
          STORAGE_DATASOURCE_CORE_USERNAME: root
          STORAGE_DATASOURCE_CORE_PASSWORD: rootpwd
        run: ./gradlew jmh --no-daemon

      - name: Generate JMH chart (SVG)
        run: python .github/scripts/generate-jmh-charts.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results-${{ github.run_number }}
          path: |
            build/results/jmh/results.json
            docs/benchmarks/jmh-results.svg
          retention-days: 30

      - name: Commit chart back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks/jmh-results.svg
          if git diff --staged --quiet; then
            echo "No chart changes to commit"
          else
            git commit -m "chore(benchmark): update JMH chart [skip ci]"
            git push
          fi
